  serviceText01: "Get suggestions on how to adapt your home to suit your needs."
  serviceText02: "Get advice on adapting your working conditions to make your job safer and more comfortable for you. This can include equipment, office furniture and adjusting your working hours to address chronic pain and injuries from car accidents, stroke and repetitive tasks."
  serviceText03: "Assess you for wheelchair that best fits you."
  serviceText04: "Identifying and recommending strategies for managing swallowing difficulties."
  serviceText05: "Assessing wounds and suggesting products and strategies to help maximize the healing process based on their causes and levels of severity (e.g., pressure wounds, ulcers, sores, burns, dermatitis)."
  serviceText06: "Experiencing chronic swelling in your limbs? Manage your edema symptoms with exercises developed specifically for you. Recommendations (along with AADL funding) also provided for compression stockings based on what caused your symptoms, such as arterial or venous deficiency, kidney failure or trauma."
  serviceText07: "Get recommendations on exercises, equipment and community programs to help prevent injuries from falls caused by illnesses such as multiple sclerosis (MS), muscular dystrophy and Parkinson’s disease; cognitive impairments such as dementia; or physical impairments such as loss of vision and stroke."
  serviceText08: "Providing personalized routines to adapt your activities of daily living and increase your safety within the community when facing symptoms of dementia, Alzheimer’s disease, vascular dementia and other cognitive impairments. Referrals to other specialists also provided."
  serviceText09: "Help apply for DATS and a handicap card (for vehicles)."
