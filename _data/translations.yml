  serviceHeading01: "Home assessment"
  serviceHeading02: "Ergonomic assessment"
  serviceHeading03: "Wheelchair assessment and acquisition"
  serviceHeading04: "Dysphagia and swallowing assessment"
  serviceHeading05: "Wound management"
  serviceHeading06: "Edema management"
  serviceHeading07: "Fall prevention"
  serviceHeading08: "Cognitive assessment"
  serviceHeading09: "DATS"
  serviceText01: "Get suggestions on how to adapt your home to suit your needs."
  serviceText02: "Get advice on equipment or adjustments to your workspace or working hours that will make your job safer and more comfortable. This includes chronic pain and injuries from car accidents, stroke and repetitive tasks."
  serviceText03: "Assess you for wheelchair that best fits you."
  serviceText04: "Identifying and recommending strategies for managing swallowing difficulties."
  serviceText05: "Pressure wounds, pressure ulcers/sores, burns, incontinent-related dermatitis (skin irritation). Assess, identify the severity of skin breakdown, whether it’s related to injury, age, or pressure. Suggest wound management strategies to reduce wound severity and maximize healing process."
  serviceText06: "Assess for chronic swelling in limbs related to arterial or venous deficiency, kidney failure or trauma. Authorizing compression stockings/garments based on their needs."
  serviceText07: "Assess fall-related concerns, identify causes (e.g., vision, cognitive impairment - dementia, physical impairments - stroke, Parkinson’s, MS, muscular dystrophy) to related to falls, complete environment assessment, suggest exercises, equipment, community programs to help strengthen you and improve your mobility to decrease falls."
  serviceText08: "Assess your cognitive abilities to determine your safety and function to live safely in community and help to identify any underlying cognitive impairment (dementia, Alzheimer’s, vascular dementia), identify any challenges for performing activities of daily living. Also help to determine level of care that you need."
  serviceText09: "Help apply for DATS and a handicap card (for vehicles)."
