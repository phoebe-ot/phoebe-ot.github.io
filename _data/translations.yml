  aadlAuthorizerHeading: "Alberta Aids to Daily Living (AADL) authorizer"
  aadlAuthorizerText: "As an AADL authorizer, I can help you get government funding to pay for equipment that will . These include wheelchairs, walkers and other mobility equipment; bathroom aids; orthotics; compression stockings and more."
  availabilityHeading: "Flexible appointments"
  availabilityText: "Book with me when you’re ready and I will help you get started on getting the equipment, adaptations and interventions you need right away."
  bio: "<p>Being an occupational therapist is how I channel my passion for helping others. Not just through the act of helping, but by constantly and actively learning more ways to help more people. Being equipped and empowered to do everything I can is not just something I want for myself, but also for the clients I treat.</p><p>If you are facing barriers related to age, injury, illness or disability that affect your quality of life, I can help you remove those barriers. By developing personalized and client-centred therapies and interventions that are unique to you - your values, your goals and your potential - I am dedicated to restoring your ability to enjoy everyday life independently, meaningfully and with dignity.</p>"
  chineseBilingualHeading: "Bilingual Chinese (Cantonese and Mandarin)"
  chineseBilingualText: "My services as an occupational therapist are fully available for Cantonese and Mandarin speakers."
